<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo Terrain Visualizer</title>
    <meta name="description" content="A high-fidelity terrain audio visualizer with dynamic 3D displacement." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #fff;
        --accent: #4f46e5;
        --bg: #000;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }
      body { 
        margin: 0; 
        background: var(--bg); 
        overflow: hidden; 
        font-family: 'Inter', sans-serif; 
        color: white; 
      }
      canvas { display: block; }
      
      #ui { 
        position: fixed; 
        top: 30px; 
        left: 30px; 
        z-index: 10; 
        pointer-events: none; 
      }
      h1 { 
        margin: 0; 
        font-family: 'Outfit', sans-serif;
        font-weight: 700; 
        letter-spacing: 2px; 
        text-transform: uppercase; 
        font-size: 1.2rem; 
        color: #fff;
      }

      #controls {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: flex;
        gap: 15px;
        align-items: center;
        background: #111;
        padding: 12px 24px;
        border-radius: 8px;
        border: 1px solid #333;
        pointer-events: all;
      }

      .btn {
        background: #eee;
        color: black;
        border: none;
        padding: 8px 20px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        text-transform: uppercase;
        font-family: 'Outfit', sans-serif;
      }

      .btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: transparent;
        color: white;
        border: 1px solid #444;
      }

      #file-input-wrapper {
        position: relative;
        overflow: hidden;
      }

      #file-input {
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }

      #status {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.7rem;
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      input[type=range] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: transparent;
        cursor: pointer;
      }

      input[type=range]:focus {
        outline: none;
      }

      /* Webkit (Chrome, Safari, Edge) */
      input[type=range]::-webkit-slider-runnable-track {
        background: #666;
        height: 4px;
        border-radius: 2px;
      }

      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 14px;
        width: 14px;
        background: white;
        border-radius: 50%;
        margin-top: -5px; /* (14-4)/2 = 5 */
        box-shadow: 0 0 5px rgba(0,0,0,0.5);
      }

      /* Firefox */
      input[type=range]::-moz-range-track {
        background: #666;
        height: 4px;
        border-radius: 2px;
      }

      input[type=range]::-moz-range-thumb {
        height: 14px;
        width: 14px;
        background: white;
        border-radius: 50%;
        border: none;
        box-shadow: 0 0 5px rgba(0,0,0,0.5);
      }

      #seeker-container {
        position: fixed;
        bottom: 110px;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: all;
        opacity: 0;
      }

      #seeker-container.visible {
        opacity: 1;
      }

      #seeker {
        width: 100%;
        margin: 0;
      }

      .time-info {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        font-family: 'Inter', sans-serif;
        letter-spacing: 1px;
        opacity: 0.5;
        text-transform: uppercase;
      }

      .volume-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-left: 10px;
        padding-left: 15px;
        border-left: 1px solid #333;
      }

      #volume-slider {
        width: 80px;
      }

      .icon {
        width: 16px;
        height: 16px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <h1>Echo Terrain Visualizer</h1>
    </div>

    <div id="status">No file loaded</div>

    <div id="seeker-container">
      <div class="time-info">
        <span id="current-time">0:00</span>
        <span id="total-time">0:00</span>
      </div>
      <input type="range" id="seeker" value="0" step="0.1" min="0" max="100">
    </div>

    <div id="controls">
      <div id="file-input-wrapper" class="btn btn-secondary">
        <span>Import Track</span>
        <input type="file" id="file-input" accept="audio/*" />
      </div>
      <button id="play-pause-btn" class="btn" disabled>Play</button>
      

      <div class="volume-wrapper">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path></svg>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
